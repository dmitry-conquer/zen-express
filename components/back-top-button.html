<!-- BACK TOP BUTTON -->

  x-data="{show: false}"

  @click="window.lenis?.scrollTo(0, {duration: 1.5})"
  type="button"
  aria-label="Back to top"
  x-cloak
  class="fixed bottom-0 left-1/2 z-100 -translate-x-1/2 translate-y-0 cursor-pointer rounded-t-lg bg-red-500 px-4 py-2 pb-1.5 transition-all duration-400"
  :class="{'translate-y-0': show, 'translate-y-full': !show}"
>
